<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>유튜브 수익 대시보드</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 유튜브 수익 대시보드</h1>
      <p class="subtitle">실시간 채널 수익 모니터링</p>
    </header>
    
    <!-- 건강도 배너 -->
    <div id="healthBanner" class="health-banner hidden"></div>

    <!-- ========================= 대시보드 ========================= -->
    <section id="dashboardSection">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">총 수익 (이번 달)</div>
          <div class="stat-value" id="totalRevenue">₩0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">총 조회수</div>
          <div class="stat-value" id="totalViews">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">평균 RPM</div>
          <div class="stat-value" id="avgRpm">₩0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">일평균 수익 (집계 <span id="daysCount">0</span>일)</div>
          <div class="stat-value" id="avgDailyRevenue">₩0</div>
        </div>
      </div>

      <div class="channel-stats">
        <h2>채널별 통계</h2>
        <div id="channelCards" class="channel-grid"></div>
      </div>

      <div class="charts-container">
        <div class="chart-box">
          <h2>일별 수익 추이</h2>
          <canvas id="revenueChart"></canvas>
        </div>
        <div class="chart-box">
          <h2>채널별 비교</h2>
          <canvas id="channelComparisonChart"></canvas>
        </div>
      </div>


      <!-- 월별 수익 차트 (NEW!) -->
      <div class="chart-box" style="margin-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <h2>📊 월별 수익 추이</h2>
          <select id="monthlyPeriodFilter" onchange="updateMonthlyRevenueChart()" style="padding: 8px 16px; border: 2px solid #e0e0e0; border-radius: 6px; cursor: pointer; font-size: 14px;">
            <option value="6">최근 6개월</option>
            <option value="12">최근 12개월</option>
            <option value="all">전체 기간</option>
          </select>
        </div>
        <canvas id="monthlyRevenueChart"></canvas>
      </div>
    </section>

    <footer>
      <p>마지막 업데이트: <span id="lastUpdate">-</span></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
